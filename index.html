<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="/src/style.css" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-tailwind-js-template</title>
  </head>
  <body>
    <h1 class="text-3xl font-bold underline">
      Hello world!
    </h1>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

<main>
  <h1 id="greeting">Hello, console habits</h1>
  <button id="change-greeting" type="button">Add 1 click</button>
  <p id="count">Clicks: 0</p>
</main>

<script>
const greeting = document.getElementById('greeting');
const btn = document.getElementById('change-greeting');
const count = document.getElementById('count');

// 2. Set the two messages
const messageOne = "Hello, console habits";
const messageTwo = "You clicked the button!";

// 3. Listen for the click
btn.addEventListener('click', () => {
  // If the current text is message one, change to message two. Otherwise, go back to one.
  if (greeting.textContent === messageOne) {
    greeting.textContent = messageTwo;
  } else {
    greeting.textContent = messageOne;
  }
});
</script>
