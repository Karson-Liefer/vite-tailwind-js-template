<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="/src/style.css" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-tailwind-js-template</title>
  </head>
  <body>
    <h1 class="text-3xl font-bold underline">
      Hello world!
    </h1>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

<main>
  <h1 id="greeting">Hello, console habits</h1>
  <button id="change-greeting" type="button">Add 1 click</button>
  <button id="reset-btn" type="button">Reset</button>
  <p id="count">Clicks: 0</p>
</main>

<script>

const countDisplay = document.getElementById('count');
const addBtn = document.getElementById('change-greeting');
const resetBtn = document.getElementById('reset-btn');

let currentClicks = 0; 


addBtn.addEventListener('click', () => {
  currentClicks++; 
  countDisplay.textContent = `Clicks: ${currentClicks}`;
});


resetBtn.addEventListener('click', () => {
  currentClicks = 0; 
  countDisplay.textContent = `Clicks: ${currentClicks}`;
});
</script>
